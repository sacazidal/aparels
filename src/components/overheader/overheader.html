@if (isVisible()) {
  <div class="overheader">
    <div class="overheader__container">
      <p class="overheader__text">
        Please note in-stock pieces will ship within an estimated two weeks of
        order.
      </p>
      <button class="overheader__closed" type="button" (click)="dismiss()">
        <img src="/images/exit.svg" alt="close" />
      </button>
    </div>
  </div>
}
